<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索上线中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画效果 */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            color: white;
            z-index: 1;
            padding: 20px;
            max-width: 600px;
        }

        /* 浮动粒子动画 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主标题 */
        .main-title {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: slideDown 1s ease-out;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 30px;
            animation: slideUp 1s ease-out 0.3s both;
            opacity: 0.9;
            font-weight: 300;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 描述文本 */
        .description {
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.8;
            animation: fadeIn 1s ease-out 0.6s both;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 倒计时器 */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.9s both;
            opacity: 0;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .countdown-label {
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* 按钮 */
        .btn-container {
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 1.2s both;
            opacity: 0;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            border: 2px solid white;
            transition: all 0.3s ease;
            margin: 0 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 社交媒体链接 */
        .social-links {
            margin-top: 40px;
            animation: fadeIn 1s ease-out 1.5s both;
            opacity: 0;
        }

        .social-links a {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin: 0 10px;
            transition: all 0.3s ease;
            line-height: 50px;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .social-links a:hover {
            background: white;
            color: #667eea;
            transform: translateY(-5px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .countdown {
                flex-wrap: wrap;
                gap: 10px;
            }

            .countdown-item {
                min-width: 70px;
                padding: 15px;
            }

            .countdown-number {
                font-size: 1.5rem;
            }

            .btn {
                display: block;
                margin: 10px auto;
                width: 80%;
            }
        }

        /* 脉冲动画 */
        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="container">
        <h1 class="main-title">🚀 探索上线中</h1>
        
        <p class="subtitle">即将推出精彩内容</p>

        <p class="description">
            我们正在精心准备一些令人兴奋的新功能和体验。
            敬请期待我们的正式上线！
        </p>

        <!-- 倒计时器 -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">天</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">小时</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">分钟</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">秒</span>
            </div>
        </div>

        <!-- 按钮 -->
        <div class="btn-container">
            <button class="btn btn-primary" onclick="alert('感谢您的关注！')">立即关注</button>
            <a href="mailto:contact@example.com" class="btn">联系我们</a>
        </div>

        <!-- 社交媒体 -->
        <div class="social-links">
            <a href="#" title="微博">微</a>
            <a href="#" title="微信">信</a>
            <a href="#" title="GitHub">G</a>
            <a href="#" title="Email">✉</a>
        </div>
    </div>

    <script>
        // 生成浮动粒子
        function createParticles() {
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 10 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 20) + 's';
                document.body.appendChild(particle);
            }
        }

        // 倒计时功能
        function updateCountdown() {
            // 设置目标日期（例如：2026年6月1日）
            const targetDate = new Date('2026-06-01').getTime();
            
            setInterval(() => {
                const now = new Date().getTime();
                const gap = targetDate - now;

                if (gap > 0) {
                    document.getElementById('days').innerText = String(Math.floor(gap / (1000 * 60 * 60 * 24))).padStart(2, '0');
                    document.getElementById('hours').innerText = String(Math.floor((gap / (1000 * 60 * 60)) % 24)).padStart(2, '0');
                    document.getElementById('minutes').innerText = String(Math.floor((gap / 1000 / 60) % 60)).padStart(2, '0');
                    document.getElementById('seconds').innerText = String(Math.floor((gap / 1000) % 60)).padStart(2, '0');
                } else {
                    document.querySelector('.countdown').innerHTML = '<h2>🎉 我们已上线！</h2>';
                }
            }, 1000);
        }

        // 初始化
        window.addEventListener('load', () => {
            createParticles();
            updateCountdown();
        });
    </script>
</body>
</html>

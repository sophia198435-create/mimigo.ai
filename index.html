<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>mimigo AI伴读 · 启发式阅读助手</title>
    <!-- 字体 & 图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 原有样式保持不变，添加一些新样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fefaf5;
            color: #2e4053;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        /* 顶部渐变条 */
        .top-accents {
            height: 6px;
            background: linear-gradient(90deg, #ffb56b, #ff8a9f, #6ec8d9);
            border-radius: 0 0 12px 12px;
        }

        /* 导航区 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 2rem;
            font-weight: 800;
            color: #e86f3c;
        }

        .logo i {
            color: #52b9cf;
        }

        .child-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fce9da;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .child-profile:hover {
            background: #f7dbc5;
        }

        .profile-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-badge i {
            font-size: 1.5rem;
            color: #e86f3c;
        }

        .edit-profile {
            color: #8f6b4f;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 主布局：两列 */
        .main-dashboard {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        /* ===== 左侧：对话区 ===== */
        .chat-section {
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 30px -12px rgba(232, 111, 60, 0.15);
            border: 2px solid #ffe3cf;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 750px;
        }

        .chat-header {
            background: linear-gradient(145deg, #fff5ea, #ffe8da);
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #ffd9b3;
        }

        .mimigo-avatar {
            width: 50px;
            height: 50px;
            background: #ff9f4b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .reading-info h3 {
            font-size: 1.3rem;
            color: #2b4a5c;
        }

        .reading-info p {
            color: #e86f3c;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .book-progress {
            margin-left: auto;
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #ffb27e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.mimigo {
            align-self: flex-start;
        }

        .message.child {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e2eef2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.mimigo .msg-avatar {
            background: #ffdec2;
            color: #e86f3c;
        }

        .message.child .msg-avatar {
            background: #c1e4f0;
            color: #2e6b8f;
        }

        .msg-content {
            background: #f8f3ef;
            padding: 0.8rem 1.2rem;
            border-radius: 20px 20px 20px 5px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .message.child .msg-content {
            background: #e1f0f7;
            border-radius: 20px 20px 5px 20px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.2rem;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border-radius: 20px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-area {
            padding: 1.2rem;
            background: #fcf5ee;
            border-top: 2px solid #ffdec2;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 1rem 1.2rem;
            border: 2px solid #ffe3cf;
            border-radius: 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #ff9f4b;
        }

        .chat-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #ffc5a0;
            background: white;
            color: #d46b38;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover:not(:disabled) {
            background: #ffdec2;
            transform: scale(1.05);
        }

        .tool-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            background: #ff9f4b;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #e88d3a;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            max-height: 750px;
            padding-right: 0.5rem;
        }

        /* 阅读统计卡片 */
        .stats-card {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            border: 2px solid #ffe3cf;
        }

        .stats-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #2b4a5c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-item {
            background: #fff5ea;
            padding: 1rem;
            border-radius: 18px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-item:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e86f3c;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #5f7e8c;
        }

        /* 当前阅读卡片 */
        .current-book {
            background: linear-gradient(135deg, #fff5ea, #ffe2d0);
            border-radius: 25px;
            padding: 1.5rem;
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .book-cover {
            width: 70px;
            height: 90px;
            background: #b8dbe9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #3d6e85;
        }

        .book-info h4 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ffe0cc;
            border-radius: 10px;
            margin: 0.5rem 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 65%;
            height: 100%;
            background: #ff9f4b;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* 快速提问卡片 */
        .quick-questions {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            border: 2px solid #ffe3cf;
        }

        .q-chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 1rem 0;
        }

        .q-chip {
            background: #f0e3d9;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #ffd9b3;
        }

        .q-chip:hover {
            background: #ffdec2;
            transform: scale(1.02);
        }

        /* 阅读记录时间线 */
        .timeline {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            border: 2px solid #ffe3cf;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            padding: 1rem 0;
            border-bottom: 1px dashed #ffdec2;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-time {
            font-size: 0.9rem;
            color: #ad7a5a;
            min-width: 60px;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-tag {
            background: #ffdec2;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 0.3rem;
        }

        /* 推荐书单 */
        .book-list {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
        }

        .book-recommend {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding: 0.8rem;
            background: #fcf5ee;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .book-recommend:hover {
            background: #f7e8db;
            transform: translateX(5px);
        }

        .age-tabs {
            display: flex;
            gap: 10px;
            margin: 1rem 0;
        }

        .age-tab {
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            background: #f0e3d9;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .age-tab:hover {
            background: #ffdec2;
        }

        .age-tab.active {
            background: #ff9f4b;
            color: white;
        }

        /* 成就徽章 */
        .badges {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            text-align: center;
            flex: 1;
            min-width: 70px;
        }

        .badge-icon {
            width: 50px;
            height: 50px;
            background: #fff0c8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 0.3rem;
            transition: transform 0.2s;
        }

        .badge:hover .badge-icon {
            transform: scale(1.1);
        }

        .badge.locked {
            opacity: 0.4;
        }

        .badge.locked .badge-icon {
            filter: grayscale(1);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 30px;
            position: relative;
            animation: modalSlideIn 0.3s;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .close:hover {
            color: #e86f3c;
        }

        #profileForm {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        #profileForm label {
            font-weight: 600;
            color: #2e4053;
        }

        #profileForm input,
        #profileForm select {
            padding: 0.8rem;
            border: 2px solid #ffe3cf;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        #profileForm input:focus,
        #profileForm select:focus {
            border-color: #ff9f4b;
        }

        .btn-primary {
            background: #ff9f4b;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #e88d3a;
        }

        /* API配置区域 */
        .api-config {
            margin-top: 1rem;
            padding: 1rem;
            background: #f0e3d9;
            border-radius: 15px;
        }

        .api-config input {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #ffc5a0;
            border-radius: 10px;
        }

        .api-status {
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .api-status.connected {
            color: #28a745;
        }

        .api-status.disconnected {
            color: #dc3545;
        }

        /* 加载指示器 */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff9f4b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1000px) {
            .main-dashboard {
                grid-template-columns: 1fr;
            }
            
            .right-panel {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="top-accents"></div>
    <div class="container">
        <!-- 导航 + 孩子档案 -->
        <div class="navbar">
            <div class="logo">
                <i class="fas fa-robot"></i> mimigo.ai
            </div>
            <div class="child-profile" id="profileButton">
                <div class="profile-badge">
                    <i class="fas fa-child"></i>
                    <span><strong id="childName">小探索家 乐乐</strong> · <span id="childAge">8</span>岁</span>
                </div>
                <div class="edit-profile">
                    <i class="fas fa-pencil-alt"></i> 编辑
                </div>
            </div>
            <div class="api-config-mini">
                <button class="tool-btn" id="configApiBtn" title="配置API"><i class="fas fa-key"></i></button>
            </div>
        </div>

        <!-- 主仪表盘：对话区 + 右侧信息 -->
        <div class="main-dashboard">
            <!-- 左侧对话区 -->
            <div class="chat-section">
                <div class="chat-header">
                    <div class="mimigo-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="reading-info">
                        <h3 id="currentBookTitle">正在共读《夏洛的网》</h3>
                        <p id="currentChapter">✨ 第12章 · 威尔伯的奇迹</p>
                    </div>
                    <div class="book-progress" id="progressDisplay">
                        <i class="fas fa-book-open"></i> 65%
                    </div>
                </div>

                <!-- 消息列表 -->
                <div class="chat-messages" id="chatMessages">
                    <!-- 动态加载消息 -->
                </div>

                <!-- 输入区 + 快捷工具 -->
                <div class="chat-input-area">
                    <input type="text" placeholder="说说你的想法..." id="messageInput" autocomplete="off">
                    <div class="chat-tools">
                        <button class="tool-btn" id="voiceBtn" title="语音输入"><i class="fas fa-microphone"></i></button>
                        <button class="tool-btn" id="suggestionBtn" title="获取建议"><i class="fas fa-lightbulb"></i></button>
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                
                <!-- 加载指示器 -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- 右侧信息面板 -->
            <div class="right-panel">
                <!-- 阅读统计卡片 -->
                <div class="stats-card">
                    <div class="stats-title">
                        <i class="fas fa-chart-line"></i> 本周阅读足迹
                    </div>
                    <div class="stats-grid" id="statsGrid">
                        <!-- 动态更新 -->
                    </div>
                </div>

                <!-- 当前阅读进度 -->
                <div class="current-book" id="currentBookCard">
                    <div class="book-cover" id="bookCover">
                        <i class="fas fa-spider"></i>
                    </div>
                    <div class="book-info">
                        <h4 id="bookTitle">《夏洛的网》</h4>
                        <p id="bookAuthor">E·B·怀特 著</p>
                        <div class="progress-bar">
                            <div class="progress-fill" id="bookProgress" style="width:65%"></div>
                        </div>
                        <p style="font-size: 0.9rem;" id="progressText">已读65% · 预计2天完成</p>
                    </div>
                </div>

                <!-- 启发提问快捷卡片 -->
                <div class="quick-questions">
                    <h4><i class="fas fa-question-circle"></i> 试试这样问孩子</h4>
                    <div class="q-chip-container" id="questionChips">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 阅读时间线 -->
                <div class="timeline">
                    <h4><i class="fas fa-history"></i> 最近阅读记录</h4>
                    <div id="timelineList">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 推荐书单 + 年龄分段 -->
                <div class="book-list">
                    <h4><i class="fas fa-star"></i> 为你推荐</h4>
                    <div class="age-tabs" id="ageTabs">
                        <span class="age-tab active" data-age="6-8">6-8岁</span>
                        <span class="age-tab" data-age="9-12">9-12岁</span>
                        <span class="age-tab" data-age="13-15">13-15岁</span>
                    </div>
                    <div id="recommendedBooks">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 成就徽章 -->
                <div class="stats-card">
                    <h4><i class="fas fa-medal"></i> 获得的成就 <span id="badgeCount"></span></h4>
                    <div class="badges" id="badgesList">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer" style="text-align: center; padding: 2rem 0; color: #8faebd;">
            <i class="fa-regular fa-copyright"></i> 2026 mimigo.ai · 启发式AI伴读
        </div>
    </div>

    <!-- 编辑资料模态框 -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>孩子档案</h2>
            <form id="profileForm">
                <label>昵称：</label>
                <input type="text" id="editName" value="乐乐" required>
                
                <label>年龄：</label>
                <input type="number" id="editAge" value="8" min="6" max="15" required>
                
                <label>阅读水平：</label>
                <select id="editLevel">
                    <option value="beginner">刚开始阅读</option>
                    <option value="fluent" selected>流畅阅读</option>
                    <option value="advanced">深入思考</option>
                </select>
                
                <label>当前在读：</label>
                <select id="editBook">
                    <option value="夏洛的网">《夏洛的网》</option>
                    <option value="小王子">《小王子》</option>
                    <option value="哈利波特">《哈利波特与魔法石》</option>
                </select>
                
                <button type="submit" class="btn-primary">保存档案</button>
            </form>
        </div>
    </div>

    <!-- API配置模态框 -->
    <div class="modal" id="apiModal">
        <div class="modal-content">
            <span class="close" id="closeApiModal">&times;</span>
            <h2>AI接口配置</h2>
            <div class="api-config">
                <label>API密钥：</label>
                <input type="password" id="apiKey" placeholder="输入DeepSeek API Key">
                
                <label>API地址：</label>
                <input type="text" id="apiEndpoint" value="https://api.deepseek.com/v1/chat/completions">
                
                <div class="api-status disconnected" id="apiStatus">⚫ 未连接</div>
                
                <button class="btn-primary" id="testApiBtn">测试连接</button>
                <button class="btn-primary" id="saveApiBtn" style="margin-top: 0.5rem;">保存配置</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据存储服务 ====================
        const StorageService = {
            // 获取孩子档案
            getProfile() {
                const defaultProfile = {
                    name: '乐乐',
                    age: 8,
                    level: 'fluent',
                    currentBook: '夏洛的网',
                    currentChapter: '第12章 · 威尔伯的奇迹',
                    progress: 65
                };
                const saved = localStorage.getItem('childProfile');
                return saved ? JSON.parse(saved) : defaultProfile;
            },
            
            // 保存孩子档案
            saveProfile(profile) {
                localStorage.setItem('childProfile', JSON.stringify(profile));
            },
            
            // 获取阅读统计
            getStats() {
                const defaultStats = {
                    totalMinutes: 158,
                    totalQuestions: 24,
                    booksCompleted: 3,
                    streakDays: 5,
                    weeklyMinutes: [25, 30, 15, 45, 20, 18, 5]
                };
                const saved = localStorage.getItem('readingStats');
                return saved ? JSON.parse(saved) : defaultStats;
            },
            
            // 保存阅读统计
            saveStats(stats) {
                localStorage.setItem('readingStats', JSON.stringify(stats));
            },
            
            // 更新统计
            updateStats(type, value = 1) {
                const stats = this.getStats();
                switch(type) {
                    case 'minute':
                        stats.totalMinutes += value;
                        stats.weeklyMinutes[6] += value;
                        break;
                    case 'question':
                        stats.totalQuestions += value;
                        break;
                    case 'book':
                        stats.booksCompleted += value;
                        break;
                }
                this.saveStats(stats);
                return stats;
            },
            
            // 获取聊天历史
            getChatHistory() {
                const saved = localStorage.getItem('chatHistory');
                return saved ? JSON.parse(saved) : [];
            },
            
            // 保存聊天历史
            saveChatHistory(history) {
                // 只保留最近100条
                if (history.length > 100) history = history.slice(-100);
                localStorage.setItem('chatHistory', JSON.stringify(history));
            },
            
            // 添加聊天消息
            addChatMessage(message) {
                const history = this.getChatHistory();
                history.push({
                    ...message,
                    timestamp: new Date().toISOString()
                });
                this.saveChatHistory(history);
            },
            
            // 获取阅读记录
            getReadingHistory() {
                const saved = localStorage.getItem('readingHistory');
                return saved ? JSON.parse(saved) : [
                    { type: '提问', content: '为什么夏洛要帮威尔伯？', date: '今天' },
                    { type: '思考', content: '好朋友就像家人的感觉', date: '昨天' },
                    { type: '读完', content: '完成《小王子》第1遍', date: '3天前' }
                ];
            },
            
            // 添加阅读记录
            addReadingRecord(record) {
                const history = this.getReadingHistory();
                history.unshift(record);
                if (history.length > 20) history.pop();
                localStorage.setItem('readingHistory', JSON.stringify(history));
            },
            
            // 获取成就
            getBadges() {
                const defaultBadges = [
                    { id: 1, name: '初次探索', icon: '🌱', unlocked: true },
                    { id: 2, name: '提问达人', icon: '❓', unlocked: true },
                    { id: 3, name: '故事侦探', icon: '🔍', unlocked: false },
                    { id: 4, name: '坚持之星', icon: '⭐', unlocked: false }
                ];
                const saved = localStorage.getItem('badges');
                return saved ? JSON.parse(saved) : defaultBadges;
            },
            
            // 保存成就
            saveBadges(badges) {
                localStorage.setItem('badges', JSON.stringify(badges));
            },
            
            // 获取API配置
            getApiConfig() {
                const defaultConfig = {
                    key: '',
                    endpoint: 'https://api.deepseek.com/v1/chat/completions',
                    enabled: false
                };
                const saved = localStorage.getItem('apiConfig');
                return saved ? JSON.parse(saved) : defaultConfig;
            },
            
            // 保存API配置
            saveApiConfig(config) {
                localStorage.setItem('apiConfig', JSON.stringify(config));
            }
        };

        // ==================== AI服务 ====================
        class AIService {
            constructor() {
                this.config = StorageService.getApiConfig();
            }
            
            // 生成启发式问题
            async generateQuestion(context) {
                // 如果API未配置，使用本地问题库
                if (!this.config.enabled || !this.config.key) {
                    return this.getLocalQuestion(context.age);
                }
                
                try {
                    const response = await fetch(this.config.endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.config.key}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                {
                                    role: 'system',
                                    content: `你是一个温暖的AI伴读助手mimigo。面对${context.age}岁孩子，根据当前对话生成一个启发式问题。问题要简短有趣，鼓励思考和表达。`
                                },
                                {
                                    role: 'user',
                                    content: `最近对话：${context.recentMessages.join('\n')}\n\n请生成下一个启发问题。`
                                }
                            ],
                            temperature: 0.8,
                            max_tokens: 100
                        })
                    });
                    
                    const data = await response.json();
                    return data.choices[0].message.content;
                    
                } catch (error) {
                    console.error('API错误，使用本地问题', error);
                    return this.getLocalQuestion(context.age);
                }
            }
            
            // 本地问题库
            getLocalQuestion(age) {
                const questions = {
                    beginner: [
                        "你觉得故事里谁最勇敢？为什么？",
                        "如果是你，会怎么做呢？",
                        "猜猜接下来会发生什么？"
                    ],
                    fluent: [
                        "你觉得主角为什么会这么做？",
                        "这个故事让你想到了什么？",
                        "你最喜欢哪个角色？为什么？"
                    ],
                    advanced: [
                        "作者通过这个故事想表达什么？",
                        "如果你可以改变结局，会怎么改？",
                        "这个故事和现实生活有什么联系？"
                    ]
                };
                
                const level = age <= 8 ? 'beginner' : (age <= 12 ? 'fluent' : 'advanced');
                const list = questions[level];
                return list[Math.floor(Math.random() * list.length)];
            }
            
            // 分析孩子回答

                    return this.getLocalResponse();
                }

                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.config.key}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                {
                                    role: 'system',
                                    content: '你是一个儿童教育专家。对孩子的回答给予简短鼓励，并提出一个相关的新问题。'
                                },
                                {
                                    role: 'user',
                                    content: `孩子说："${childMessage}"，请回应并提问。`
                                }
                            ],
                            temperature: 0.7,
                            max_tokens: 150
                        })
                    });
                    
                    const data = await response

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>mimigo AI伴读 · 终极旗舰版</title>
    <!-- 字体 & 图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fefaf5;
            color: #2e4053;
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        body.night-mode {
            background-color: #1a2a33;
            color: #e0e0e0;
        }

        body.night-mode .card,
        body.night-mode .chat-section,
        body.night-mode .stats-card,
        body.night-mode .current-book,
        body.night-mode .quick-questions,
        body.night-mode .timeline,
        body.night-mode .book-list {
            background-color: #2a3a44;
            border-color: #4a5a64;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        /* 顶部渐变条 */
        .top-accents {
            height: 6px;
            background: linear-gradient(90deg, #ffb56b, #ff8a9f, #6ec8d9);
            border-radius: 0 0 12px 12px;
        }

        /* 导航区 - 终极版 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 1rem 0;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 2rem;
            font-weight: 800;
            color: #e86f3c;
        }

        .logo i {
            color: #52b9cf;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .child-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fce9da;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
        }

        .child-dropdown {
            font-size: 1.1rem;
            padding: 0.3rem 0.8rem;
            border: 2px solid #ffc5a0;
            border-radius: 30px;
            background: white;
            font-family: inherit;
            font-weight: 600;
            color: #2e4053;
            cursor: pointer;
        }

        .add-child {
            background: #ff9f4b;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-child:hover {
            transform: scale(1.1);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #ffc5a0;
            background: white;
            color: #e86f3c;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .nav-btn:hover {
            background: #ffdec2;
            transform: scale(1.05);
        }

        .nav-btn.active {
            background: #ff9f4b;
            color: white;
            border-color: #ff9f4b;
        }

        /* 同步状态 */
        .sync-status {
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            background: #e0f0e0;
            color: #2e7d32;
            cursor: pointer;
        }

        .sync-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .sync-status i {
            margin-right: 4px;
        }

        /* 家长监控入口 */
        .parent-badge {
            background: #4a6fa5;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* 主布局 */
        .main-dashboard {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        /* 对话区 */
        .chat-section {
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 30px -12px rgba(232, 111, 60, 0.15);
            border: 2px solid #ffe3cf;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 750px;
        }

        .chat-header {
            background: linear-gradient(145deg, #fff5ea, #ffe8da);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #ffd9b3;
        }

        .mimigo-avatar {
            width: 50px;
            height: 50px;
            background: #ff9f4b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .reading-info {
            flex: 1;
        }

        .reading-info h3 {
            font-size: 1.3rem;
            color: #2b4a5c;
        }

        .reading-info p {
            color: #e86f3c;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .progress-control {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .book-progress {
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #ffb27e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.mimigo { align-self: flex-start; }
        .message.child { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.mimigo .msg-avatar {
            background: #ffdec2;
            color: #e86f3c;
        }

        .message.child .msg-avatar {
            background: #c1e4f0;
            color: #2e6b8f;
        }

        .msg-content {
            background: #f8f3ef;
            padding: 0.8rem 1.2rem;
            border-radius: 20px 20px 20px 5px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .message.child .msg-content {
            background: #e1f0f7;
            border-radius: 20px 20px 5px 20px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.2rem;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border-radius: 20px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-area {
            padding: 1.2rem;
            background: #fcf5ee;
            border-top: 2px solid #ffdec2;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 1rem 1.2rem;
            border: 2px solid #ffe3cf;
            border-radius: 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #ff9f4b;
        }

        .chat-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #ffc5a0;
            background: white;
            color: #d46b38;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover:not(:disabled) {
            background: #ffdec2;
            transform: scale(1.05);
        }

        .tool-btn.recording {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
            animation: recording-shake 0.5s infinite;
        }

        @keyframes recording-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .send-btn {
            background: #ff9f4b;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            max-height: 750px;
            padding-right: 0.5rem;
        }

        /* 孩子快速切换卡片 */
        .children-quick-switch {
            background: white;
            border-radius: 25px;
            padding: 1rem;
            border: 2px solid #ffe3cf;
            display: flex;
            gap: 1rem;
            overflow-x: auto;
        }

        .child-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0.5rem;
            border-radius: 15px;
            cursor: pointer;
            min-width: 70px;
            transition: all 0.2s;
        }

        .child-tab.active {
            background: #ffdec2;
        }

        .child-tab-avatar {
            width: 50px;
            height: 50px;
            background: #f0e3d9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        /* 统计卡片 */
        .stats-card {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            border: 2px solid #ffe3cf;
        }

        .stats-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-item {
            background: #fff5ea;
            padding: 1rem;
            border-radius: 18px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e86f3c;
        }

        /* 当前阅读卡片 */
        .current-book {
            background: linear-gradient(135deg, #fff5ea, #ffe2d0);
            border-radius: 25px;
            padding: 1.5rem;
        }

        .book-header {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .book-cover {
            width: 70px;
            height: 90px;
            background: #b8dbe9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .progress-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ffe0cc;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ff9f4b;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            border-radius: 30px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ffe3cf;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-primary {
            background: #ff9f4b;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-secondary {
            background: #f0e3d9;
            border: 2px solid #ffc5a0;
            padding: 0.8rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* 社交分享按钮 */
        .share-buttons {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .share-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .share-btn.wechat { background: #07C160; }
        .share-btn.weibo { background: #E6162D; }
        .share-btn.twitter { background: #1DA1F2; }
        .share-btn.copy { background: #6c757d; }

        /* 家长监控面板 */
        .parent-dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .child-progress-card {
            background: #f0f7ff;
            padding: 1rem;
            border-radius: 15px;
        }

        .progress-chart {
            height: 100px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 1rem 0;
            position: relative;
            overflow: hidden;
        }

        .chart-bar {
            position: absolute;
            bottom: 0;
            width: 30px;
            background: #ff9f4b;
            border-radius: 5px 5px 0 0;
        }

        /* 加载动画 */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff9f4b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1000px) {
            .main-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="top-accents"></div>
    <div class="container">
        <!-- 导航区 -->
        <div class="navbar">
            <div class="logo">
                <i class="fas fa-robot"></i> mimigo.ai
            </div>
            
            <div class="nav-center">
                <div class="child-selector">
                    <select id="childSelector" class="child-dropdown"></select>
                    <button class="add-child" id="addChildBtn">+</button>
                </div>
                
                <div class="sync-status" id="syncStatus" onclick="app.showSyncModal()">
                    <i class="fas fa-cloud"></i> <span id="syncStatusText">已同步</span>
                </div>
                
                <div class="parent-badge" onclick="app.showParentDashboard()">
                    <i class="fas fa-user-shield"></i> 家长监控
                </div>
            </div>
            
            <div class="nav-actions">
                <button class="nav-btn" id="shareBtn" title="分享成就"><i class="fas fa-share-alt"></i></button>
                <button class="nav-btn" id="voiceSettingsBtn" title="语音设置"><i class="fas fa-microphone-alt"></i></button>
                <button class="nav-btn" id="fullscreenBtn" title="全屏"><i class="fas fa-expand"></i></button>
                <button class="nav-btn" id="settingsBtn" title="设置"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <!-- 孩子快速切换栏 -->
        <div class="children-quick-switch" id="quickSwitch"></div>

        <!-- 主仪表盘 -->
        <div class="main-dashboard">
            <!-- 左侧对话区 -->
            <div class="chat-section">
                <div class="chat-header">
                    <div class="mimigo-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="reading-info">
                        <h3 id="currentBookTitle"></h3>
                        <p id="currentChapter"></p>
                    </div>
                    <div class="progress-control">
                        <div class="book-progress" id="progressDisplay"></div>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-area">
                    <input type="text" placeholder="说说你的想法..." id="messageInput">
                    <div class="chat-tools">
                        <button class="tool-btn" id="voiceBtn" title="语音输入"><i class="fas fa-microphone"></i></button>
                        <button class="tool-btn" id="suggestionBtn" title="AI建议"><i class="fas fa-lightbulb"></i></button>
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- 右侧信息面板 -->
            <div class="right-panel">
                <div class="stats-card">
                    <div class="stats-title">
                        <i class="fas fa-chart-line"></i> 本周阅读
                        <span class="sync-badge offline" id="statsSyncBadge">本地</span>
                    </div>
                    <div class="stats-grid" id="statsGrid"></div>
                </div>

                <div class="current-book" id="currentBookCard">
                    <div class="book-header">
                        <div class="book-cover" id="bookCover">🕷️</div>
                        <div class="book-info">
                            <h4 id="bookTitle"></h4>
                            <p id="bookAuthor"></p>
                        </div>
                    </div>
                    
                    <div class="progress-controls">
                        <div class="progress-bar-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="bookProgress" style="width:65%"></div>
                            </div>
                            <input type="range" id="progressSlider" class="progress-slider" min="0" max="100" value="65">
                        </div>
                    </div>
                </div>

                <div class="quick-questions">
                    <h4><i class="fas fa-question-circle"></i> 启发提问</h4>
                    <div class="q-chip-container" id="questionChips"></div>
                </div>

                <div class="timeline">
                    <h4><i class="fas fa-history"></i> 阅读记录</h4>
                    <div id="timelineList"></div>
                </div>

                <div class="book-list">
                    <h4><i class="fas fa-star"></i> 为你推荐</h4>
                    <div class="age-tabs" id="ageTabs">
                        <span class="age-tab active" data-age="6-8">6-8岁</span>
                        <span class="age-tab" data-age="9-12">9-12岁</span>
                        <span class="age-tab" data-age="13-15">13-15岁</span>
                    </div>
                    <div id="recommendedBooks"></div>
                </div>

                <div class="stats-card">
                    <h4><i class="fas fa-medal"></i> 成就 <span id="badgeCount"></span></h4>
                    <div class="badges" id="badgesList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 模态框 ==================== -->

    <!-- 添加孩子模态框 -->
    <div class="modal" id="childModal">
        <div class="modal-content">
            <span class="close" id="closeChildModal">&times;</span>
            <h2>添加孩子</h2>
            <form id="childForm">
                <div class="form-group">
                    <label>昵称：</label>
                    <input type="text" id="childName" required>
                </div>
                <div class="form-group">
                    <label>年龄：</label>
                    <input type="number" id="childAge" min="6" max="15" required>
                </div>
                <div class="form-group">
                    <label>头像：</label>
                    <select id="childAvatar">
                        <option value="👦">👦 男孩</option>
                        <option value="👧">👧 女孩</option>
                        <option value="🐼">🐼 熊猫</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 云端同步模态框 -->
    <div class="modal" id="syncModal">
        <div class="modal-content">
            <span class="close" id="closeSyncModal">&times;</span>
            <h2><i class="fas fa-cloud"></i> 云端同步</h2>
            <div class="sync-panel">
                <div class="form-group">
                    <label>Firebase配置：</label>
                    <textarea id="firebaseConfig" rows="4" placeholder='{
  "apiKey": "your-api-key",
  "authDomain": "your-auth-domain",
  "projectId": "your-project-id"
}'></textarea>
                </div>

    <script>
        // ==================== Firebase模拟服务 ====================
        class FirebaseService {
            constructor(config) {
                this.config = config;
                this.isConnected = false;
                this.user = null;
            }
            
            async signIn(email, password) {
                // 模拟Firebase登录
                return new Promise((resolve) => {
                    setTimeout(() => {
                        this.isConnected = true;
                        this.user = { email, uid: 'user_' + Date.now() };
                        resolve({ success: true, user: this.user });
                    }, 1000);
                });
            }
            
            async uploadData(path, data) {
                if (!this.isConnected) throw new Error('未登录');
                return new Promise((resolve) => {
                    setTimeout(() => {
                        localStorage.setItem('firebase_backup_' + path, JSON.stringify(data));
                        resolve({ success: true });
                    }, 1000);
                });
            }
            
            async downloadData(path) {
                if (!this.isConnected) throw new Error('未登录');
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const data = localStorage.getItem('firebase_backup_' + path);
                        resolve(data ? JSON.parse(data) : null);
                    }, 1000);
                });
            }
        }

        // ==================== 专业语音服务 ====================
        class ProfessionalVoiceService {
            constructor() {
                this.provider = 'web';
                this.apiKey = '';
                this.region = 'eastasia';
                this.speed = 1;
            }
            
            setConfig(provider, apiKey, region, speed) {
                this.provider = provider;
                this.apiKey = apiKey;
                this.region = region;
                this.speed = speed;
            }
            
            async speak(text) {
                switch(this.provider) {
                    case 'web':
                        this.webSpeech(text);
                        break;
                    case 'azure':
                        await this.azureSpeech(text);
                        break;
                    case 'xunfei':
                        await this.xunfeiSpeech(text);
                        break;
                }
            }
            
            webSpeech(text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = this.speed;
                window.speechSynthesis.speak(utterance);
            }
            
            async azureSpeech(text) {
                // 模拟Azure语音API
                console.log('Azure语音合成:', text);
                this.webSpeech(text); // 回退到Web Speech
            }
            
            async xunfeiSpeech(text) {
                // 模拟讯飞语音API
                console.log('讯飞语音合成:', text);
                this.webSpeech(text);
            }
            
            async recognize(callback) {
                if (this.provider === 'web') {
                    if ('webkitSpeechRecognition' in window) {
                        const recognition = new webkitSpeechRecognition();
                        recognition.lang = 'zh-CN';
                        recognition.onresult = (e) => {
                            callback(e.results[0][0].transcript);
                        };
                        recognition.start();
                    }
                }
            }
        }

        // ==================== AI增强服务 ====================
        class AIEnhancedService {
            constructor() {
                this.apiKey = localStorage.getItem('deepseek_key') || '';
            }
            
            async generateQuestion(context) {
                if (!this.apiKey) {
                    return this.fallbackQuestion(context);
                }
                
                try {
                    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                { role: 'system', content: '你是一个儿童AI伴读助手，根据对话生成启发式问题。' },
                                { role: 'user', content: context }
                            ],
                            temperature: 0.8
                        })
                    });
                    
                    const data = await response.json();
                    return data.choices[0].message.content;
                } catch (error) {
                    console.error('AI API错误', error);
                    return this.fallbackQuestion(context);
                }
            }
            
            fallbackQuestion(context) {
                const questions = [
                    "为什么会这样呢？",
                    "如果是你会怎么做？",
                    "然后发生了什么？",
                    "你觉得他为什么难过？",
                    "猜猜接下来会怎样？"
                ];
                return questions[Math.floor(Math.random() * questions.length)];
            }
            
            async analyzeReading(childId) {
                // AI分析阅读数据，生成建议
                return {
                    insights: ['提问增多', '理解力提升'],
                    recommendations: ['推荐《夏洛的网》', '增加科普阅读']
                };
            }
        }

        // ==================== 社交分享服务 ====================

                // 模拟微信分享
                alert(`分享到微信：\n${title}\n${content}`);

            shareToWeibo(title, content) {
                const url = `https://service.weibo.com/share/share.php?title=${encodeURIComponent(title + '\n' + content)}`;
                window.open(url, '_blank');
            }
            
            shareToTwitter(title, content) {
                const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title + '\n' + content)}`;
                window.open(url, '_blank');
            }
            
            copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('已复制到剪贴板');
                });
            }
        }

        // ==================== 完整书库 ====================
        const LIBRARY = {
            books: {
                '6-8': [
                    { id: 1, title: '猜猜我有多爱你', author: '山姆·麦克布雷尼', cover: '🌳', tags: ['亲情', '温暖'], pages: 32 },

                    { id: 7, title: '小王子', author: '圣埃克苏佩里', cover: '👑', tags: ['哲学', '童话'], pages: 112 },
                    { id: 8, title: '哈利波特与魔法石', author: 'J.K.罗琳', cover: '⚡', tags: ['奇幻', '冒险'], pages: 256 },
                    { id: 9, title: '查理和巧克力工厂', author: '罗尔德·达尔', cover: '🍫', tags: ['奇幻', '幽默'], pages: 192 },
                    { id: 10, title: '绿野仙踪', author: '弗兰克·鲍姆', cover: '🌈', tags: ['冒险', '成长'], pages: 208 }
                ],
                '13-15': [
                    { id: 11, title: '三体', author: '刘慈欣', cover: '🌌', tags: ['科幻', '思考'], pages: 384 },
                    { id: 12, title: '平凡的世界', author: '路遥', cover: '📚', tags: ['成长', '现实'], pages: 432 },
                    { id: 13, title: '解忧杂货店', author: '东野圭吾', cover: '🏪', tags: ['温情', '治愈'], pages: 288 },
                    { id: 14, title: '追风筝的人', author: '卡勒德·胡赛尼', cover: '🪁', tags: ['人性', '救赎'], pages: 368 },
                    { id: 15, title: '流浪地球', author: '刘慈欣', cover: '🌍', tags: ['科幻', '冒险'], pages: 336 }
                ]
            },
            
            getAllBooks() {
                return [...this.books['6-8'], ...this.books['9-12'], ...this.books['13-15']];
            }
        };

        // ==================== 主应用 ====================
        class MimigoApp {
            constructor() {
                this.children = this.loadChildren();
                this.currentChildId = localStorage.getItem('currentChildId') || '1';
                this.firebase = new FirebaseService();
                this.voiceService = new ProfessionalVoiceService();
                this.aiService = new AIEnhancedService();
                this.socialShare = new SocialShareService();
                
                this.init();
            }
            
            loadChildren() {
                const saved = localStorage.getItem('mimigo_children');
                if (saved) return JSON.parse(saved);
                
                return [
                    { id: '1', name: '乐乐', age: 8, avatar: '👦', 
                      currentBook: '夏洛的网', currentChapter: '第12章', progress: 65,
                      stats: { totalMinutes: 158, totalQuestions: 24, booksCompleted: 3 } },
                    { id: '2', name: '悠悠', age: 10, avatar: '👧',
                      currentBook: '小王子', currentChapter: '第8章', progress: 42,
                      stats: { totalMinutes: 245, totalQuestions: 38, booksCompleted: 5 } }
                ];
            }
            
            saveChildren() {
                localStorage.setItem('mimigo_children', JSON.stringify(this.children));
            }
            
            getCurrentChild() {
                return this.children.find(c => c.id === this.currentChildId) || this.children[0];
            }
            
            init() {
                this.renderChildSelector();
                this.renderQuickSwitch();
                this.renderCurrentChildData();
                this.loadChatHistory();
                this.bindEvents();
                
                // 加载API密钥
                const apiKey = localStorage.getItem('deepseek_key');
                if (apiKey) this.aiService.apiKey = apiKey;
            }
            
            renderChildSelector() {
                const selector = document.getElementById('childSelector');
                selector.innerHTML = this.children.map(child => 
                    `<option value="${child.id}" ${child.id === this.currentChildId ? 'selected' : ''}>
                        ${child.avatar} ${child.name} (${child.age}岁)
                    </option>`
                ).join('');
            }
            
            renderQuickSwitch() {
                const quickSwitch = document.getElementById('quickSwitch');
                quickSwitch.innerHTML = this.children.map(child => `
                    <div class="child-tab ${child.id === this.currentChildId ? 'active' : ''}" 
                         onclick="app.switchChild('${child.id}')">
                        <div class="child-tab-avatar">${child.avatar}</div>
                        <div>${child.name}</div>
                    </div>
                `).join('');
            }
            
            switchChild(childId) {
                this.currentChildId = childId;
                localStorage.setItem('currentChildId', childId);
                this.renderChildSelector();
                this.renderQuickSwitch();
                this.renderCurrentChildData();
                this.loadChatHistory();
            }
            
            renderCurrentChildData() {
                const child = this.getCurrentChild();
                
                document.getElementById('currentBookTitle').textContent = `正在读《${child.currentBook}》`;
                document.getElementById('currentChapter').textContent = child.currentChapter;
                document.getElementById('progressDisplay').innerHTML = `<i class="fas fa-book-open"></i> ${child.progress}%`;
                document.getElementById('bookProgress').style.width = child.progress + '%';
                document.getElementById('progressSlider').value = child.progress;
                document.getElementById('bookTitle').textContent = `《${child.currentBook}》`;
                
                const book = LIBRARY.getAllBooks().find(b => b.title === child.currentBook);
                if (book) {
                    document.getElementById('bookAuthor').textContent = book.author;
                    document.getElementById('bookCover').textContent = book.cover;
                }
                
                this.renderStats();
                this.renderBadges();
            }
            
            renderStats() {
                const child = this.getCurrentChild();
                const stats = child.stats;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-number">${Math.floor(stats.totalMinutes/60)}h ${stats.totalMinutes%60}m</div>
                        <div class="stat-label">阅读时长</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${stats.totalQuestions}</div>
                        <div class="stat-label">提问</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${stats.booksCompleted}</div>
                        <div class="stat-label">完成书目</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${Math.floor(stats.totalMinutes/7)}</div>
                        <div class="stat-label">日均分钟</div>
                    </div>
                `;
            }
            
            renderBadges() {
                const child = this.getCurrentChild();
                const badges = [
                    { name: '🌱 探索者', unlocked: true },
                    { name: '❓ 提问家', unlocked: child.stats.totalQuestions > 10 },
                    { name: '📚 阅读星', unlocked: child.stats.booksCompleted > 2 },
                    { name: '⭐ 坚持者', unlocked: child.stats.totalMinutes > 200 }
                ];
                
                document.getElementById('badgesList').innerHTML = badges.map(b => `
                    <div class="badge ${b.unlocked ? '' : 'locked'}">
                        <div class="badge-icon">${b.name.split(' ')[0]}</div>
                        <span>${b.name.split(' ')[1]}</span>
                    </div>
                `).join('');
                
                const unlocked = badges.filter(b => b.unlocked).length;
                document.getElementById('badgeCount').textContent = `${unlocked}/${badges.length}`;
            }
            
            renderBooks(ageRange) {
                const books = LIBRARY.books[ageRange] || LIBRARY.books['9-12'];
                
                document.getElementById('recommendedBooks').innerHTML = books.slice(0, 3).map(book => `
                    <div class="book-recommend" onclick="app.selectBook('${book.title}')">
                        <div style="background: #c1e0d6; width: 50px; height: 70px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                            ${book.cover}
                        </div>
                        <div>
                            <h5>《${book.title}》</h5>
                            <p>${book.tags.join(' · ')}</p>
                        </div>
                    </div>
                `).join('');
            }
            
            selectBook(title) {
                const child = this.getCurrentChild();
                child.currentBook = title;
                child.progress = 0;
                child.currentChapter = '第1章 · 开始阅读';
                
                this.saveChildren();
                this.renderCurrentChildData();
                this.addMessage(`我们开始读《${title}》吧！`, false);
            }
            
            loadChatHistory() {
                const key = `chat_${this.currentChildId}`;
                const history = JSON.parse(localStorage.getItem(key) || '[]');
                const messagesDiv = document.getElementById('chatMessages');
                
                messagesDiv.innerHTML = '';
                
                if (history.length === 0) {
                    this.addMessage('嗨！我是mimigo。今天想读什么书？', false);
                } else {
                    history.forEach(msg => this.addMessage(msg.text, msg.isChild, false));
                }
            }
            
            addMessage(text, isChild = false, save = true) {
                const messagesDiv = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isChild ? 'child' : 'mimigo'}`;
                
                const child = this.getCurrentChild();
                
                messageDiv.innerHTML = `
                    <div class="msg-avatar">${isChild ? child.avatar : '<i class="fas fa-robot"></i>'}</div>
                    <div class="msg-content">${text}</div>
                `;
                
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                if (save) {
                    const key = `chat_${this.currentChildId}`;
                    const history = JSON.parse(localStorage.getItem(key) || '[]');
                    history.push({ text, isChild, timestamp: new Date() });
                    if (history.length > 100) history.shift();
                    localStorage.setItem(key, JSON.stringify(history));
                }
            }
            
            async sendMessage() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text) return;
                
                this.addMessage(text, true);
                input.value = '';
                
                // 更新统计
                const child = this.getCurrentChild();
                child.stats.totalQuestions++;
                this.saveChildren();
                this.renderStats();
                
                // 显示打字指示
                this.showTyping();
                
                // AI生成回复
                const context = `孩子${child.age}岁，在读《${child.currentBook}》，说："${text}"`;
                const reply = await this.aiService.generateQuestion(context);
                
                this.hideTyping();
                this.addMessage(reply, false);
                
                // 语音朗读
                this.voiceService.speak(reply);
            }
            
            showTyping() {
                const div = document.createElement('div');
                div.className = 'message mimigo typing';
                div.id = 'typingIndicator';
                div.innerHTML = `
                    <div class="msg-avatar"><i class="fas fa-robot"></i></div>
                    <div class="typing-indicator">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                `;
                document.getElementById('chatMessages').appendChild(div);
            }
            
            hideTyping() {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
            }
            
            // 云端同步
            async syncLogin() {
                const config = document.getElementById('firebaseConfig').value;
                const email = document.getElementById('syncEmail').value;
                const password = document.getElementById('syncPassword').value;
                
                try {
                    const result = await this.firebase.signIn(email, password);
                    if (result.success) {
                        document.getElementById('syncStatusText').textContent = '在线';
                        document.getElementById('syncStatus').style.background = '#e0f0e0';
                    }
                } catch (error) {
                    alert('登录失败');
                }
            }
            
            async syncUpload() {
                const data = {
                    children: this.children,
                    chats: {}
                };
                
                this.children.forEach(child => {
                    const key = `chat_${child.id}`;
                    data.chats[child.id] = JSON.parse(localStorage.getItem(key) || '[]');
                });
                
                await this.firebase.uploadData('mimigo_data', data);
                alert('上传成功');
            }
            
            // 家长监控
            showParentDashboard() {
                document.getElementById('parentModal').classList.add('show');
            }
            
            unlockParentDashboard() {
                const password = document.getElementById('parentPassword').value;
                if (password === 'admin123') { // 示例密码
                    document.getElementById('parentDashboard').style.display = 'block';
                    this.renderParentDashboard();
                } else {
                    alert('密码错误');
                }
            }
            
            renderParentDashboard() {
                const grid = document.getElementById('parentDashboardGrid');
                grid.innerHTML = this.children.map(child => `
                    <div class="child-progress-card">
                        <h4>${child.avatar} ${child.name} (${child.age}岁)</h4>
                        <p>今日阅读: ${Math.floor(Math.random() * 30)}分钟</p>
                        <p>本周提问: ${child.stats.totalQuestions}</p>
                        <p>当前进度: ${child.progress}%</p>
                    </div>
                `).join('');
                
                // 绘制阅读图表
                const chart = document.getElementById('readingChart');
                chart.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'chart-bar';
                    bar.style.height = (30 + Math.random() * 50) + 'px';
                    bar.style.left = (i * 40 + 20) + 'px';
                    chart.appendChild(bar);
                }
                
                // 显示所有聊天
                const chats = document.getElementById('allChats');
                chats.innerHTML = '';
                this.children.forEach(child => {
                    const key = `chat_${child.id}`;
                    const history = JSON.parse(localStorage.getItem(key) || '[]');
                    chats.innerHTML += `<h4>${child.name}的对话</h4>`;
                    history.slice(-5).forEach(msg => {
                        chats.innerHTML += `<p>${msg.isChild ? '👤' : '🤖'}: ${msg.text}</p>`;
                    });
                });
            }
            
            exportData() {
                const data = {
                    children: this.children,
                    exportTime: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mimigo_export.json';
                a.click();
            }
            
            // 分享成就
            showShareModal() {
                const child = this.getCurrentChild();
                const shareContent = document.getElementById('shareContent');
                shareContent.innerHTML = `
                    <h3>${child.avatar} ${child.name} 的阅读成就</h3>
                    <p>📚 已读 ${child.stats.booksCompleted} 本书</p>
                    <p>❓ 提问 ${child.stats.totalQuestions} 个</p>
                    <p>⏱️ 阅读 ${Math.floor(child.stats.totalMinutes/60)} 小时</p>
                    <p>🏆 正在读《${child.currentBook}》</p>
                `;
                document.getElementById('shareModal').classList.add('show');
            }
            
            shareToWeChat() {
                const child = this.getCurrentChild();
                const text = `${child.avatar} ${child.name} 在mimigo阅读${child.stats.booksCompleted}本书啦！`;
                this.socialShare.shareToWeChat('阅读成就', text);
            }
            
            shareToWeibo() {
                const child = this.getCurrentChild();
                const text = `${child.avatar} ${child.name} 在mimigo阅读${child.stats.booksCompleted}本书，提问${child.stats.totalQuestions}个！`;
                this.socialShare.shareToWeibo('mimigo阅读成就', text);
            }
            
            shareToTwitter() {
                const child = this.getCurrentChild();
                const text = `${child.name} read ${child.stats.booksCompleted} books on mimigo!`;
                this.socialShare.shareToTwitter('Reading Achievement', text);
            }
            
            copyShareLink() {
                const child = this.getCurrentChild();
                const text = `我在mimigo读了${child.stats.booksCompleted}本书！`;
                this.socialShare.copyToClipboard(text);
            }
            
            bindEvents() {
                // 发送消息
                document.getElementById('sendBtn').addEventListener('click', () => this.sendMessage());
                document.getElementById('messageInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });
                
                // 进度调整
                document.getElementById('progressSlider').addEventListener('input', (e) => {
                    const child = this.getCurrentChild();
                    child.progress = e.target.value;
                    document.getElementById('bookProgress').style.width = child.progress + '%';
                    document.getElementById('progressDisplay').innerHTML = `<i class="fas fa-book-open"></i> ${child.progress}%`;
                    this.saveChildren();
                });
                
                // 添加孩子
                document.getElementById('addChildBtn').addEventListener('click', () => {
                    document.getElementById('childModal').classList.add('show');
                });
                
                document.getElementById('childForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const newChild = {
                        id: Date.now().toString(),
                        name: document.getElementById('childName').value,
                        age: parseInt(document.getElementById('childAge').value),
                        avatar: document.getElementById('childAvatar').value,
                        currentBook: '夏洛的网',
                        currentChapter: '第1章',
                        progress: 0,
                        stats: { totalMinutes: 0, totalQuestions: 0, booksCompleted: 0 }
                    };
                    
                    this.children.push(newChild);
                    this.saveChildren();
                    this.renderChildSelector();
                    this.renderQuickSwitch();
                    document.getElementById('childModal').classList.remove('show');
                });
                
                // 语音
                document.getElementById('voiceBtn').addEventListener('click', () => {
                    this.voiceService.recognize((text) => {
                        document.getElementById('messageInput').value = text;
                        this.sendMessage();
                    });
                });
                
                document.getElementById('voiceSettingsBtn').addEventListener('click', () => {
                    document.getElementById('voiceModal').classList.add('show');
                });
                
                document.getElementById('testVoiceBtn').addEventListener('click', () => {
                    const provider = document.getElementById('voiceService').value;
                    const apiKey = document.getElementById('voiceApiKey').value;
                    const region = document.getElementById('voiceRegion').value;
                    const speed = document.getElementById('voiceSpeed').value;
                    
                    this.voiceService.setConfig(provider, apiKey, region, speed);
                    this.voiceService.speak('你好，我是mimigo语音助手');
                });
                
                // 分享
                document.getElementById('shareBtn').addEventListener('click', () => this.showShareModal());
                
                // 年龄标签
                document.querySelectorAll('.age-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.age-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        this.renderBooks(tab.dataset.age);
                    });
                });
                
                // 默认书单
                this.renderBooks('6-8');
                
                // 同步按钮
                document.getElementById('syncLoginBtn').addEventListener('click', () => this.syncLogin());
                document.getElementById('syncUploadBtn').addEventListener('click', () => this.syncUpload());
                
                // 设置
                document.getElementById('settingsBtn').addEventListener('click', () => {
                    document.getElementById('settingsModal').classList.add('show');
                    document.getElementById('settingsApiKey').value = localStorage.getItem('deepseek_key') || '';
                });
                
                document.getElementById('saveSettingsBtn').addEventListener('click', () => {
                    const key = document.getElementById('settingsApiKey').value;
                    localStorage.setItem('deepseek_key', key);
                    this.aiService.apiKey = key;
                    
                    const theme = document.getElementById('settingsTheme').value;
                    if (theme === 'night') {
                        document.body.classList.add('night-mode');
                    } else {
                        document.body.classList.remove('night-mode');
                    }
                    
                    document.getElementById('settingsModal').classList.remove('show');
                });
                
                // 关闭模态框
                document.querySelectorAll('.close').forEach(btn => {
                    btn.addEventListener('click', () => {
                        btn.closest('.modal').classList.remove('show');
                    });
                });
                
                // 全屏
                document.getElementById('fullscreenBtn').addEventListener('click', () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        document.documentElement.requestFullscreen();
                    }
                });
            }
        }

        // 启动应用
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new MimigoApp();
            window.app = app;
        });
    </script>
</body>
</html>
